worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # ---- HTTP → HTTPS 重定向 ----
    server {
        listen 3456;
        server_name _;
        return 301 https://$host:3457$request_uri;
    }

    # ---- HTTPS 主服务 ----
    server {
        listen 3457 ssl;
        server_name _;

        # mkcert 证书（已复制到 nginx 目录下）
        ssl_certificate     cert.crt;
        ssl_certificate_key cert.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 静态文件（前端页面）
        root ../../src;
        index index.html;

        # API 反向代理 → Node.js
        location /api/ {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # CA证书下载
        location /ca {
            alias rootCA.pem;
            add_header Content-Type application/x-pem-file;
            add_header Content-Disposition 'attachment; filename="cikecidi-ca.pem"';
        }

        # SPA fallback：非文件请求返回 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
