<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>未曾寄出的信</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <!-- 全局错误兜底 -->
    <div id="error-screen" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#2a2520;color:#f5f0e8;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:sans-serif;text-align:center;padding:20px;">
        <div style="font-size:64px;margin-bottom:24px;">📮</div>
        <p style="font-size:16px;line-height:1.8;">哎呀，出错了，请重启试试吧~</p>
    </div>

    <div id="app">
        <!-- 墙的容器 -->
        <div id="wall-container">
            <!-- 三个模块入口层 -->
            <div id="wall-public" class="wall-layer active">
                <div class="wall-surface"></div>
                <div class="wall-letters"></div>
            </div>
            <div id="wall-drawer" class="wall-layer">
                <div class="drawer-interior"></div>
            </div>
            <div id="wall-timeboard" class="wall-layer">
                <div class="timeboard-surface"></div>
            </div>
        </div>

        <!-- 导航 -->
        <nav id="nav-bar">
            <button id="nav-public" class="nav-btn active" data-target="wall-public">
                <span class="nav-icon">📮</span>
                <span class="nav-label">公共墙</span>
            </button>
            <button id="nav-drawer" class="nav-btn" data-target="wall-drawer">
                <span class="nav-icon">🗄️</span>
                <span class="nav-label">我的抽屉</span>
            </button>
            <button id="nav-timeletter" class="nav-btn" data-target="wall-timeboard">
                <span class="nav-icon">📌</span>
                <span class="nav-label">时光信</span>
            </button>
        </nav>

        <!-- 模态层 -->
        <div id="modal-overlay" class="hidden">
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="./js/shared/storage.js"></script>
    <script src="./js/shared/camera.js"></script>
    <script src="./js/shared/letter.js"></script>
    <script src="./js/shared/wall.js"></script>
    <script src="./js/modules/public-wall/public-wall.js"></script>
    <script src="./js/modules/private-drawer/private-drawer.js"></script>
    <script src="./js/modules/time-letter/time-letter.js"></script>
    <script src="./js/data/preset-letters.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
