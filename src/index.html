<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>未曾寄出的信</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <!-- 全局错误兜底 -->
    <div id="error-screen" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#2a2520;color:#f5f0e8;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:sans-serif;text-align:center;padding:20px;">
        <div style="font-size:64px;margin-bottom:24px;">📮</div>
        <p style="font-size:16px;line-height:1.8;">哎呀，出错了，请重启试试吧~</p>
    </div>

    <div id="app">
        <!-- 墙的容器 -->
        <div id="wall-container">
            <!-- 三个模块入口层 -->
            <div id="wall-public" class="wall-layer active">
                <canvas id="wall-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;"></canvas>
            </div>
            <div id="wall-drawer" class="wall-layer">
                <div class="drawer-interior"></div>
            </div>
            <div id="wall-timeboard" class="wall-layer">
                <div class="timeboard-surface"></div>
            </div>
        </div>

        <!-- 导航 -->
        <nav id="nav-bar">
            <button id="nav-public" class="nav-btn active" data-target="wall-public">
                <span class="nav-icon">📮</span>
                <span class="nav-label">公共墙</span>
            </button>
            <button id="nav-drawer" class="nav-btn" data-target="wall-drawer">
                <span class="nav-icon">🗄️</span>
                <span class="nav-label">我的抽屉</span>
            </button>
            <button id="nav-timeletter" class="nav-btn" data-target="wall-timeboard">
                <span class="nav-icon">📌</span>
                <span class="nav-label">时光信</span>
            </button>
        </nav>

        <!-- 模态层 -->
        <div id="modal-overlay" class="hidden">
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- 项目配置（内联JSON，无网络请求） -->
    <script type="application/json" id="project-config">
    {
        "name": "未曾寄出的信",
        "name_en": "Unsent Letters",
        "version": "1.0.0",
        "gameplay_type": "情感互动 / 轻量交互",
        "gameplay_details": "在旧墙上发现陌生人匿名留下的信，读后留下无声回响（石头/叶子/灯/蒲公英/水滴）。也可自己写信，选择藏身方式（信箱/门缝/窗台/暖气管/墙缝）和信纸（笔记本纸/小票背面/餐巾纸/日历页/烧过的纸），投入墙面。时光信功能可将信绑定到真实地点和时间，好友需到场拍照才能解锁。",
        "interaction_mode": "点击（发现信件、阅读、投递回响）+ 滑动（浏览墙面）+ 输入（写信正文与署名）+ 拍照（时光信创建与解锁）",
        "visual_style": "旧物手写质感 — 暖灰砖墙背景、做旧信封、5种手写信纸纹理、褪色墨水色系、回响物件符号（🪨🍃💡🪽💧）",
        "screen_orientation": "竖屏",
        "tech_stack": "HTML5 Canvas + CSS + Vanilla JS（无框架）",
        "storage": "localStorage",
        "package_size": "~121KB 源码（远低于8MB限制）",
        "offline": true,
        "competition": "抖音AI创变者大赛 · 赛道一 · 互动空间"
    }
    </script>

    <script src="./js/shared/storage.js"></script>
    <script src="./js/shared/camera.js"></script>
    <script src="./js/shared/letter.js"></script>
    <script src="./js/shared/wall.js"></script>
    <script src="./js/shared/canvas-renderer.js"></script>
    <script src="./js/modules/public-wall/public-wall.js"></script>
    <script src="./js/modules/private-drawer/private-drawer.js"></script>
    <script src="./js/modules/time-letter/time-letter.js"></script>
    <script src="./js/data/preset-letters.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
